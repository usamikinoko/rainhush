{{define "header"}}
<header class="header">
    <div class="header-inner">
        <div class="header-brand">
            <a href="/">{{.SiteName}}</a>
        </div>
        <button
            class="header-menu-btn"
            onclick="toggleMenu()"
            aria-label="Toggle menu"
            aria-controls="site-nav"
            aria-expanded="false"
            type="button"
        >
            <span class="menu-bar"></span>
            <span class="menu-bar"></span>
            <span class="menu-bar"></span>
        </button>
        <nav class="header-nav" id="site-nav">
            <a href="/index.html" class="{{index .Nav "Home"}}">Home</a>
            <a href="/articles.html" class="{{index .Nav "Articles"}}">Articles</a>
            <a href="/friends.html" class="{{index .Nav "Friends"}}">Friends</a>
            <a href="/about.html" class="{{index .Nav "About"}}">About</a>
            <div class="header-nav-actions">
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" type="button">
                    <svg class="theme-toggle-icon icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="theme-toggle-icon icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </nav>
    </div>
</header>
{{end}}
