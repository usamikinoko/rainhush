name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: amd64
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            target: linux
            arch: arm64
            goos: linux
            goarch: arm64
          - os: macos-latest
            target: darwin
            arch: amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            target: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
          - os: windows-latest
            target: windows
            arch: amd64
            goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${{ github.ref_name }}
          BIN_NAME="rash"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="rash.exe"
          fi
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${BIN_NAME}" .

      - name: Package (tar.gz)
        if: matrix.target != 'windows'
        run: |
          ASSET="rash_${{ matrix.target }}_${{ matrix.arch }}.tar.gz"
          tar -czf "${ASSET}" "rash"
          echo "asset=${ASSET}" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.target == 'windows'
        run: |
          ASSET="rash_windows_${{ matrix.arch }}.zip"
          7z a "${ASSET}" "rash.exe"
          echo "asset=${ASSET}" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.asset }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true