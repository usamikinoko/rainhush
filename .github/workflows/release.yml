name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  goos: linux,   goarch: amd64 }
          - { os: ubuntu-latest,  goos: linux,   goarch: arm64 }
          - { os: macos-latest,   goos: darwin,  goarch: amd64 }
          - { os: macos-latest,   goos: darwin,  goarch: arm64 }
          - { os: windows-latest, goos: windows, goarch: amd64 }
          - { os: windows-latest, goos: windows, goarch: "386" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BIN="rash"
          [ "$GOOS" = "windows" ] && BIN="rash.exe"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION#v}" -o "$BIN" .

      - name: Package (unix)
        if: matrix.goos != "windows"
        shell: bash
        run: |
          ASSET="rash_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "$ASSET" rash
          echo "asset_name=$ASSET" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.goos == "windows"
        shell: pwsh
        run: |
          $ASSET = "rash_windows_${{ matrix.goarch }}.zip"
          Compress-Archive -Path rash.exe -DestinationPath $ASSET
          "asset_name=$ASSET" | Add-Content -Path $env:GITHUB_ENV -Encoding UTF8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset_name }}
          path: ${{ env.asset_name }}
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true

